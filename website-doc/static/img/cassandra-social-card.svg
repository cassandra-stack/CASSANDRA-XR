  <text x="84" y="392" fill="#2F3B45" font-size="76" font-weight="700" font-family="Segoe UI, Arial, sans-serif">CASSANDRA XR</text>
  <text x="84" y="458" fill="#52616C" font-size="34" font-family="Segoe UI, Arial, sans-serif">Technical documentation for architecture, rendering, voice runtime,</text>
  <text x="84" y="502" fill="#52616C" font-size="34" font-family="Segoe UI, Arial, sans-serif">backend orchestration, and platform configuration.</text>
  <circle cx="912" cy="274" r="118" fill="none" stroke="url(#ring)" stroke-width="18"/>
  <circle cx="912" cy="274" r="62" fill="#2F3B45"/>
