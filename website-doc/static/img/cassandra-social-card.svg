<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Cassandra XR Social Card</title>
  <desc id="desc">Branded social preview card for the Cassandra XR documentation site.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1080" y2="590" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F7FBFD"/>
      <stop offset="100%" stop-color="#EAF1F8"/>
    </linearGradient>
    <linearGradient id="ring" x1="760" y1="120" x2="1030" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6FC3D0"/>
      <stop offset="100%" stop-color="#4A90E2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <circle cx="980" cy="178" r="126" fill="#6FC3D0" fill-opacity=".12"/>
  <circle cx="1060" cy="470" r="180" fill="#4A90E2" fill-opacity=".08"/>
  <g>
    <rect x="84" y="88" width="110" height="110" rx="28" fill="#FFFFFF" stroke="#D9E3EF"/>
